    <script type="text/babel">

        // Reusable Modal component with outside click handler
        const Modal = ({ children, onClose }) => {
            const modalRef = React.useRef(null);

            React.useEffect(() => {
                const handleClickOutside = (event) => {
                    if (modalRef.current && !modalRef.current.contains(event.target)) {
                        onClose();
                    }
                };

                document.addEventListener('mousedown', handleClickOutside);
                return () => {
                    document.removeEventListener('mousedown', handleClickOutside);
                };
            }, [onClose]);

            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
                    <div ref={modalRef}>
                        {children}
                    </div>
                </div>
            );
        };


   

        const MiniHistogramChart = ({ data }) => {
  const chartRef = React.useRef(null);
  const chartInstance = React.useRef(null);

  React.useEffect(() => {
    if (chartRef.current) {
      if (chartInstance.current) {
        chartInstance.current.destroy();
      }

      const ctx = chartRef.current.getContext("2d");

      chartInstance.current = new Chart(ctx, {
        type: "bar",
        data: {
          labels: data.map(d => d.label),
          datasets: [{
            label: "Time Distribution",
            data: data.map(d => d.count),
            backgroundColor: "#3B82F6",
            borderRadius: 6,
          }]
        },
        options: {
          scales: {
            x: {
              ticks: { color: "#94a3b8" },
              grid: { display: false }
            },
            y: {
              ticks: { color: "#94a3b8" },
              grid: { color: "#1e293b" }
            }
          },
          plugins: {
            legend: { display: false }
          },
          responsive: true,
          maintainAspectRatio: false,
        }
      });
    }
  }, [data]);

  return (
    <div style={{ height: "200px" }}>
      <canvas ref={chartRef}></canvas>
    </div>
  );
};

};



const getDailyStats = (solves) => {
  if (!solves || solves.length === 0) return [];
  
  const dailyStats = {};
  
  solves.forEach(solve => {
    try {
      const dateObj = new Date(solve.id || solve.date);
      if (isNaN(dateObj.getTime())) return;
      
      // Use consistent date format
      const dateStr = dateObj.toLocaleDateString('en-US', {
        month: 'short',
        day: 'numeric',
        year: 'numeric'
      });
      
      dailyStats[dateStr] = (dailyStats[dateStr] || 0) + 1;
    } catch (error) {
      console.error('Error processing solve:', error, solve);
    }
  });

  return Object.entries(dailyStats)
    .map(([date, count]) => ({ date, count }))
    .sort((a, b) => new Date(b.date) - new Date(a.date));
};

        // Helper function to generate a new scramble
        const generateScramble = (length = 20) => {
        const moves = ["R", "L", "U", "D", "F", "B"];
        const modifiers = ["", "'", "2"];
        const axisMap = {
          R: 'x', L: 'x',
          U: 'y', D: 'y',
          F: 'z', B: 'z',
        };

        const scramble = [];
        let lastAxis = '';

        for (let i = 0; i < length; i++) {
          let move, axis;
          do {
            move = moves[Math.floor(Math.random() * moves.length)];
            axis = axisMap[move];
          } while (axis === lastAxis); // avoid same axis consecutively

          lastAxis = axis;
          const modifier = modifiers[Math.floor(Math.random() * modifiers.length)];
          scramble.push(move + modifier);
        }

        return scramble.join("   "); // extra spaces for readability
      };


        
        const getEffectiveTime = (solve) => {
          if (solve.penalty === 'DNF') return Infinity;
          if (solve.penalty === '+2') return solve.time + 2;
          return solve.time;
        };

        // Helper function to calculate the average with the new custom logic
        const getAverage = (solvesArray, n) => {
          try {
            if (solvesArray.length < n) {
              return { value: 'N/A', solves: [], excludedSolves: [] };
            }

            // Slice the last 'n' solves for the average calculation
            const times = solvesArray.slice(0, n).map(solve => getEffectiveTime(solve));
            const sortedTimes = [...times].sort((a, b) => a - b);
            const allSolvesInWindow = solvesArray.slice(0, n);

            let timesToAverage;
            let excludedTimes = [];

            if (n === 3) {
              timesToAverage = sortedTimes;
            } else if (n === 5 || n === 12) {
              timesToAverage = sortedTimes.slice(1, sortedTimes.length - 1);
              excludedTimes = [sortedTimes[0], sortedTimes[sortedTimes.length - 1]];
            } else {
              const trimCount = Math.floor(n * 0.05);
              if (n - 2 * trimCount < 1) {
                  return { value: 'N/A', solves: [], excludedSolves: [] };
              }
              timesToAverage = sortedTimes.slice(trimCount, sortedTimes.length - trimCount);
              excludedTimes = [...sortedTimes.slice(0, trimCount), ...sortedTimes.slice(sortedTimes.length - trimCount)];
            }

            if (timesToAverage.length === 0) {
              return { value: 'N/A', solves: [], excludedSolves: [] };
            }

            // Any remaining DNF in the window means a DNF average
            if (timesToAverage.some(t => t === Infinity)) {
              return { value: 'DNF', solves: allSolvesInWindow, excludedSolves: [] };
            }

            const sum = timesToAverage.reduce((acc, curr) => acc + curr, 0);
            const avg = (sum / timesToAverage.length).toFixed(2);

            const excludedSolves = allSolvesInWindow.filter(s => excludedTimes.includes(getEffectiveTime(s)));

            return { value: avg, solves: allSolvesInWindow, excludedSolves };
          } catch (error) {
            console.error("Error calculating average:", error);
            return { value: 'Error', solves: [], excludedSolves: [] };
          }
        };



        const getTimeDistribution = (solves) => {
            if (!solves || solves.length === 0) return [];

            // ⛑️ Filter out any solve with invalid or missing time
            const validTimes = solves.map(s => s.time).filter(t => typeof t === 'number' && !isNaN(t));

                if (validTimes.length === 0) return [];

                const maxTime = Math.max(...validTimes);
                const bucketSize = 5;
                const bucketCount = Math.ceil(maxTime / bucketSize) || 1;

                const buckets = Array(bucketCount).fill(0).map((_, i) => ({
                  min: i * bucketSize,
                  max: (i + 1) * bucketSize,
                  count: 0
                }));

                solves.forEach(solve => {
                  const t = solve.time;
                  if (typeof t === 'number' && !isNaN(t)) {
                    const bucketIndex = Math.floor(t / bucketSize);
                    if (bucketIndex < buckets.length) {
                      buckets[bucketIndex].count++;
                    }
                  }
                });

                return buckets.map(bucket => ({
                  min: bucket.min,
                  max: bucket.max,
                  label: `${bucket.min}-${bucket.max}s`,
                  count: bucket.count
                })).sort((a, b) => a.min - b.min);
              };




        // Modal component to show PB details

                                        </li>
                                    );

        };

  return (

        // New Chart Component for Time Progression
        const TimeProgressionGraph = ({ solves, size = 'small', isDark = true }) => {
    const chartRef = React.useRef(null);

    const chronologicalSolves = [...solves].sort((a, b) => a.id - b.id);

    // Rolling average helpers (trim best+worst for n>=5)
    const rollingAvg = (arr, n) => arr.map((_, i) => {
      if (i < n - 1) return null;
      const w = arr.slice(i - n + 1, i + 1).map(s => s.time);
      const sorted = [...w].sort((a, b) => a - b);
      const trimmed = n <= 3 ? sorted : sorted.slice(1, sorted.length - 1);
      return +(trimmed.reduce((a, b) => a + b, 0) / trimmed.length).toFixed(2);
    });

    const rollingAo5  = rollingAvg(chronologicalSolves, 5);
    const rollingAo12 = rollingAvg(chronologicalSolves, 12);

    React.useEffect(() => {
        if (chartRef.current && chronologicalSolves.length > 0) {
            if (chartRef.current.chart) chartRef.current.chart.destroy();

            const textColor = isDark ? '#ccc' : '#334155';
            const gridColor = isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)';
            const titleColor = isDark ? '#fff' : '#0f172a';

            const data = {
                labels: chronologicalSolves.map((_, i) => `#${i + 1}`),
                datasets: [
                  {
                    label: 'Time',
                    data: chronologicalSolves.map(s => s.time),
                    fill: false,
                    borderColor: 'rgb(75,192,192)',
                    borderWidth: 1.5,
                    tension: 0.1,
                    pointRadius: 2,
                    pointBackgroundColor: 'rgb(75,192,192)',
                    hoverRadius: 5,
                    pointHoverBackgroundColor: 'rgb(255,99,132)',
                    pointHoverBorderColor: 'rgb(255,99,132)',
                  },
                  {
                    label: 'Ao5',
                    data: rollingAo5,
                    fill: false,
                    borderColor: 'rgba(251,146,60,0.9)',
                    borderWidth: 2,
                    tension: 0.3,
                    pointRadius: 0,
                    spanGaps: false,
                  },
                  {
                    label: 'Ao12',
                    data: rollingAo12,
                    fill: false,
                    borderColor: 'rgba(167,139,250,0.9)',
                    borderWidth: 2,
                    tension: 0.3,
                    pointRadius: 0,
                    spanGaps: false,
                  },
                ],
            };

            const options = {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: {
                        title: { display: true, text: 'Time (s)', color: titleColor },
                        ticks: { color: textColor },
                        grid: { color: gridColor },
                    },
                    x: {
                        title: { display: true, text: 'Solve Number', color: titleColor },
                        ticks: {
                            color: textColor,
                            autoSkip: true,
                            maxTicksLimit: size === 'small' ? 5 : 20,
                            maxRotation: 0,
                            minRotation: 0
                        },
                        grid: { color: gridColor },
                    },
                },
                plugins: {
                    legend: {
                        display: true,
                        labels: { color: textColor, boxWidth: 10, font: { size: 10 } }
                    },
                }
            };

            chartRef.current.chart = new Chart(chartRef.current.getContext('2d'), {
                type: 'line', data, options,
            });
        }
    }, [solves, isDark]);

    const chartHeight = size === 'large' ? '500px' : '200px';
    const chartWidth  = size === 'large' ? '800px' : '100%';

    return solves.length > 0 ? (
        <div style={{ position: 'relative', width: chartWidth, height: chartHeight, margin: '0 auto' }}>

      <div className="space-y-6 max-h-[65vh] overflow-y-auto no-scrollbar pr-2">
        
        {/* Controls Section */}
        <section>
          <h3 className="text-xl font-semibold mb-3 flex items-center text-blue-300">
            <span className="mr-2">⌨️</span> Controls
          </h3>
          <div className="bg-slate-800 p-4 rounded-lg space-y-2 border border-slate-700">
            <p><span className="font-bold text-green-400">Start:</span> Hold <span className="bg-slate-700 px-2 py-0.5 rounded text-sm font-mono">Space</span> until the numbers turn green (0.3s), then release.</p>
            <p><span className="font-bold text-red-400">Stop:</span> Press any key while timing to record your result.</p>
            <p><span className="font-bold text-slate-400">Cancel:</span> Press <span className="bg-slate-700 px-2 py-0.5 rounded text-sm font-mono">Esc</span> while holding Space to abort the start.</p>
          </div>
        </section>

        {/* Features Grid */}
        <section>
          <h3 className="text-xl font-semibold mb-3 text-blue-300">Advanced Features</h3>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div className="bg-slate-800 p-3 rounded-lg border border-slate-700">
              <h4 className="font-bold text-white mb-1">📁 Smart Sessions</h4>
              <p className="text-sm text-slate-400">Create custom categories for different cubes. Everything is saved automatically to your local storage.</p>
            </div>
            <div className="bg-slate-800 p-3 rounded-lg border border-slate-700">
              <h4 className="font-bold text-white mb-1">📊 Outlier Trimming</h4>
              <p className="text-sm text-slate-400">Ao5 and Ao12 averages automatically exclude your fastest and slowest times to match WCA standards.</p>
            </div>
            <div className="bg-slate-800 p-3 rounded-lg border border-slate-700">
              <h4 className="font-bold text-white mb-1">📈 Advanced Stats</h4>
              <p className="text-sm text-slate-400">Track Sub-X consistency rates and view time progression graphs to visualize your improvement.</p>
            </div>
            <div className="bg-slate-800 p-3 rounded-lg border border-slate-700">
              <h4 className="font-bold text-white mb-1">🔍 Solve Details</h4>
              <p className="text-sm text-slate-400">Click any past solve to see the exact scramble used and the timestamp of when it happened.</p>
            </div>
          </div>
        </section>

        {/* Tip Section */}
        <section className="bg-blue-900/20 border border-blue-500/30 p-4 rounded-lg">
          <p className="text-sm text-blue-200">
            <strong>💡 Pro Tip:</strong> Click on your Personal Best stats (like Ao5) in the sidebar to see exactly which solves were used in that average!
          </p>
        </section>
      </div>

      {/* Footer Button */}
      <button 
        className="w-full mt-6 py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg shadow-lg transition-all transform active:scale-95"
        onClick={() => setShowHowToUse(false)}
      >
        Got it!
      </button>
    </div>
  </Modal>
)}
              
              
              <PBDetailsModal pbDetails={pbDetails} onClose={handleClosePBDetails} />
              {showGraphModal && <GraphModal solves={solves} onClose={handleCloseGraphModal} isDark={isDarkMode} />}
              {showDailyModal && <DailySolvesModal solves={solves} onClose={() => setShowDailyModal(false)} />}
                {showTimeModal && (<TimeDistributionModal solves={solves} onClose={() => setShowTimeModal(false)}
  />
)}
              </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script type="module" src="https://cdn.cubing.net/js/scramble-display"></script>
</body>
</html>
