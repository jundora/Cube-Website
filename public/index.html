        // Reusable Modal component with outside click handler
        const Modal = ({ children, onClose }) => {
            const modalRef = React.useRef(null);

            React.useEffect(() => {
                const handleClickOutside = (event) => {
                    if (modalRef.current && !modalRef.current.contains(event.target)) {
                        onClose();
                    }
                };

                document.addEventListener('mousedown', handleClickOutside);
                return () => {
                    document.removeEventListener('mousedown', handleClickOutside);
                };
            }, [onClose]);

            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
                    <div ref={modalRef}>
                        {children}
                    </div>
                </div>
            );
        };

      chartInstance.current = new Chart(ctx, {
        type: "bar",
        data: {
          labels: data.map(d => d.label),

            label: "Time Distribution",

const getDailyStats = (solves) => {
  if (!solves || solves.length === 0) return [];
  
  const dailyStats = {};
  
  solves.forEach(solve => {
    try {
      const dateObj = new Date(solve.id || solve.date);
      if (isNaN(dateObj.getTime())) return;
      
      // Use consistent date format
      const dateStr = dateObj.toLocaleDateString('en-US', {
        month: 'short',
        day: 'numeric',
        year: 'numeric'
      });
      
      dailyStats[dateStr] = (dailyStats[dateStr] || 0) + 1;
    } catch (error) {
      console.error('Error processing solve:', error, solve);
    }
  });

  return Object.entries(dailyStats)
    .map(([date, count]) => ({ date, count }))
    .sort((a, b) => new Date(b.date) - new Date(a.date));
};

        // Helper function to generate a new scramble
        const generateScramble = (length = 20) => {
        const moves = ["R", "L", "U", "D", "F", "B"];
        const modifiers = ["", "'", "2"];
        const axisMap = {
          R: 'x', L: 'x',
          U: 'y', D: 'y',
          F: 'z', B: 'z',
        };

        const scramble = [];
        let lastAxis = '';

        for (let i = 0; i < length; i++) {
          let move, axis;
          do {
            move = moves[Math.floor(Math.random() * moves.length)];
            axis = axisMap[move];
          } while (axis === lastAxis); // avoid same axis consecutively

          lastAxis = axis;
          const modifier = modifiers[Math.floor(Math.random() * modifiers.length)];
          scramble.push(move + modifier);
        }

        return scramble.join("   "); // extra spaces for readability
      };


        
        // Helper function to calculate the average with the new custom logic
        const getAverage = (solvesArray, n) => {
          try {
            if (solvesArray.length < n) {
              return { value: 'N/A', solves: [], excludedSolves: [] };
            }
            
            // Slice the last 'n' solves for the average calculation
            const times = solvesArray.slice(0, n).map(solve => solve.time);
            const sortedTimes = [...times].sort((a, b) => a - b);
            const allSolvesInWindow = solvesArray.slice(0, n);

            let timesToAverage;
            let excludedTimes = [];

            if (n === 3) {
              // For Ao3, simply average all three solves
              timesToAverage = sortedTimes;
            } else if (n === 5 || n === 12) {
              // For Ao5 and Ao12, remove the best and worst times
              timesToAverage = sortedTimes.slice(1, sortedTimes.length - 1);
              excludedTimes = [sortedTimes[0], sortedTimes[sortedTimes.length - 1]];
            } else {
              // For larger averages, shave off 5% from the best and worst times
              const trimCount = Math.floor(n * 0.05);
              if (n - 2 * trimCount < 1) { // Ensure there are still solves to average
                  return { value: 'N/A', solves: [], excludedSolves: [] };
              }
              timesToAverage = sortedTimes.slice(trimCount, sortedTimes.length - trimCount);
              excludedTimes = [...sortedTimes.slice(0, trimCount), ...sortedTimes.slice(sortedTimes.length - trimCount)];
            }

            if (timesToAverage.length === 0) {
              return { value: 'N/A', solves: [], excludedSolves: [] };
            }

            const sum = timesToAverage.reduce((acc, curr) => acc + curr, 0);
            const avg = (sum / timesToAverage.length).toFixed(2);
            
            const excludedSolves = allSolvesInWindow.filter(s => excludedTimes.includes(s.time));

            return { value: avg, solves: allSolvesInWindow, excludedSolves };
          } catch (error) {
            console.error("Error calculating average:", error);
            return { value: 'Error', solves: [], excludedSolves: [] };
          }
        };



        const getTimeDistribution = (solves) => {
            if (!solves || solves.length === 0) return [];

            // ⛑️ Filter out any solve with invalid or missing time
            const validTimes = solves.map(s => s.time).filter(t => typeof t === 'number' && !isNaN(t));

                if (validTimes.length === 0) return [];

                const maxTime = Math.max(...validTimes);
                const bucketSize = 5;
                const bucketCount = Math.ceil(maxTime / bucketSize) || 1;

                const buckets = Array(bucketCount).fill(0).map((_, i) => ({
                  min: i * bucketSize,
                  max: (i + 1) * bucketSize,
                  count: 0
                }));

                solves.forEach(solve => {
                  const t = solve.time;
                  if (typeof t === 'number' && !isNaN(t)) {
                    const bucketIndex = Math.floor(t / bucketSize);
                    if (bucketIndex < buckets.length) {
                      buckets[bucketIndex].count++;
                    }
                  }
                });

                return buckets.map(bucket => ({
                  min: bucket.min,
                  max: bucket.max,
                  label: `${bucket.min}-${bucket.max}s`,
                  count: bucket.count
                })).sort((a, b) => a.min - b.min);
              };

                  };

              const findBestAverage = (n) => {
                  if (solvesArray.length < n) return { value: 'N/A', solves: [], excludedSolves: [] };
                  let bestAvg = Infinity;
                  let bestSolves = [];
                  let bestExcludedSolves = [];

                  // Sort solves in chronological order for average calculation
                  const chronologicalSolves = [...solvesArray].sort((a,b) => a.id - b.id);

                  for (let i = 0; i <= chronologicalSolves.length - n; i++) {
                      const windowSolves = chronologicalSolves.slice(i, i + n);
                      const avgResult = getAverage(windowSolves, n);
                      const avg = parseFloat(avgResult.value);
                      if (avgResult.value !== 'N/A' && avg < bestAvg) {
                          bestAvg = avg;
                          bestSolves = windowSolves;
                          bestExcludedSolves = avgResult.excludedSolves;

                  return bestAvg === Infinity ? { value: 'N/A', solves: [], excludedSolves: [] } : { value: bestAvg.toFixed(2), solves: bestSolves, excludedSolves: bestExcludedSolves };

                          {/* Time Distribution */}
                          <div
  className="bg-slate-800 p-4 rounded-lg cursor-pointer hover:bg-slate-700 transition"
  onClick={() => setShowTimeModal(true)}
>
  <h5 className="text-lg font-bold mb-2">Time Distribution</h5>
  <TimeDistributionCard solves={solves} />
</div>

{/* Daily Solves */}
<div
  onClick={() => setShowDailyModal(true)}
  className="bg-slate-800 p-4 rounded-lg cursor-pointer hover:bg-slate-700 transition-colors"
>
  <h5 className="text-lg font-bold mb-2">Daily Solves</h5>
  <p className="text-slate-300 text-sm text-center">Click to view solve history</p>
</div>



                          
                      </div>
                  </div>

                </div>

                
              )}

              {/* Simplified view for when the spacebar is held for > 0.3s or timing */}
              {!shouldShowFullUI && (
                <div className="flex flex-col justify-center items-center">
                    <h2 className={`text-[14rem] md:text-[20rem] leading-none font-bold transition-colors duration-200 ${timerColorClass}`}>
                        {displayedTime}
                    </h2>
                </div>
              )}

              {/* Delete Confirmation Modal */}
              {showDeleteConfirmId && (
                <Modal onClose={cancelDelete}>
                  <div className="bg-slate-900 p-8 rounded-xl shadow-lg text-center">
                    <p className="text-xl mb-4">Are you sure you want to delete this solve?</p>
                    <div className="flex justify-center space-x-4">
                      <button
                        onClick={confirmDelete}
                        className="px-6 py-3 bg-red-600 hover:bg-red-700 rounded-lg text-white font-semibold"
                      >
                        Confirm
                      </button>
                      <button
                        onClick={cancelDelete}
                        className="px-6 py-3 bg-gray-600 hover:bg-gray-700 rounded-lg text-white font-semibold"
                      >
                        Cancel
                      </button>
                    </div>
                  </div>
                </Modal>
              )}
              
              {/* Session Management Modal */}
              {showSessionModal && (
                <Modal onClose={() => setShowSessionModal(false)}>
                    <div className="bg-slate-900 p-8 rounded-xl shadow-lg w-full max-w-md text-white">
                        <div className="flex justify-between items-center mb-4">
                            <h2 className="text-2xl font-bold">Manage Sessions</h2>
                            <button onClick={() => setShowSessionModal(false)} className="text-red-400 hover:text-red-500 font-bold text-3xl">&times;</button>
                        </div>
                        
                        <div className="mb-4">
                            <h3 className="text-xl font-semibold mb-2">Current Session</h3>
                            <p className="text-xl font-bold text-blue-400 mb-4">{currentSession}</p>
                        </div>

                        <div className="mb-4">
                            <h3 className="text-xl font-semibold mb-2">Create New Session</h3>
                            <div className="flex space-x-2">
                                <input
                                    type="text"
                                    value={newSessionName}
                                    onChange={(e) => setNewSessionName(e.target.value)}
                                    onKeyDown={(e) => {
                                        if (e.key === 'Enter') handleAddSession();
                                    }}
                                    placeholder="Enter session name"
                                    className="flex-1 px-4 py-2 bg-slate-800 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors"
                                />
                                <button
                                    onClick={handleAddSession}
                                    className="px-4 py-2 bg-green-600 hover:bg-green-700 rounded-lg text-white font-semibold"
                                >
                                    Add
                                </button>
                            </div>
                        </div>

                        <div className="mb-4 max-h-48 overflow-y-auto no-scrollbar">
                            <h3 className="text-xl font-semibold mb-2">All Sessions</h3>
                            <ul className="space-y-2">
                                {Object.keys(sessions).map(sessionName => (
                                    <li 
                                        key={sessionName} 
                                        className={`flex justify-between items-center p-2 rounded-lg cursor-pointer transition-colors ${currentSession === sessionName ? 'bg-blue-800' : 'bg-slate-800 hover:bg-slate-700'}`}
                                    >
                                        {editingSessionName === sessionName ? (
                                            <div className="flex-1 flex items-center space-x-2">
                                                <input
                                                    type="text"
                                                    value={tempNewName}
                                                    onChange={(e) => setTempNewName(e.target.value)}
                                                    onKeyDown={(e) => {
                                                        if (e.key === 'Enter') handleRenameSession(sessionName, tempNewName);
                                                        if (e.key === 'Escape') setEditingSessionName(null);
                                                    }}
                                                    className="flex-1 px-2 py-1 bg-slate-700 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-blue-500"
                                                />
                                                <button onClick={() => handleRenameSession(sessionName, tempNewName)} className="text-green-400 hover:text-green-500 font-bold">✔</button>
                                                <button onClick={() => setEditingSessionName(null)} className="text-red-400 hover:text-red-500 font-bold">&times;</button>
                                            </div>
                                        ) : (
                                            <div className="flex-1 flex justify-between items-center" onClick={() => setCurrentSession(sessionName)}>
                                                <span className="font-medium">{sessionName}</span>
                                                <div className="flex items-center space-x-2">
                                                    <button 
                                                        onClick={(e) => { 
                                                            e.stopPropagation(); 
                                                            setEditingSessionName(sessionName);
                                                            setTempNewName(sessionName);
                                                        }}
                                                        className="text-sm text-blue-400 hover:text-blue-500"
                                                    >
                                                        Rename
                                                    </button>
                                                    {sessionName !== 'default' && (
                                                        <button 
                                                            onClick={(e) => { e.stopPropagation(); handleDeleteSession(sessionName); }}
                                                            className="text-red-400 hover:text-red-500 font-bold text-lg"
                                                        >
                                                            &times;
                                                        </button>
                                                    )}
                                                </div>
                                            </div>
                                        )}
                                    </li>
                                ))}
                            </ul>
                        </div>
                    </div>
                </Modal>
              )}

              <PBDetailsModal pbDetails={pbDetails} onClose={handleClosePBDetails} />
              {showGraphModal && <GraphModal solves={solves} onClose={handleCloseGraphModal} />}
              {showDailyModal && <DailySolvesModal solves={solves} onClose={() => setShowDailyModal(false)} />}
                {showTimeModal && (<TimeDistributionModal solves={solves} onClose={() => setShowTimeModal(false)}
  />
)}
              </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script type="module" src="https://cdn.cubing.net/js/scramble-display"></script>
</body>
</html>
